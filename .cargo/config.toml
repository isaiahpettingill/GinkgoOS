[build]
target = "x86_64-unknown-none"
rustc-wrapper = "sccache"

[target.x86_64-unknown-none]
rustflags = [
    "-C", "link-arg=--gc-sections",
    "-C", "relocation-model=static",
    "-C", "code-model=kernel",
    "-C", "force-frame-pointers=yes",
    "--cfg", "curve25519_dalek_backend=\"serial\"",
]
