[package]
name = "ginkgo-os"
version = "0.1.0"
edition = "2021"
publish = false

[dependencies]
redoxfs = { path = "vendor/redoxfs", default-features = false }
spinning_top = "0.3"
syscall = { package = "redox_syscall", version = "0.9.0", default-features = false }
talc = "5.0.4"

[build-dependencies]
redoxfs = { path = "vendor/redoxfs", default-features = false }
syscall = { package = "redox_syscall", version = "0.9.0" }

[profile.dev]
panic = "abort"

[profile.release]
panic = "abort"
lto = true
codegen-units = 1
opt-level = 2
strip = false
